name: Fetch Intervals CSV

on:
  schedule:
    - cron: "0 7 * * *"   # 08:00 Copenhagen during CET (UTC+1)
    - cron: "0 8 * * *"   # 09:00 Copenhagen during CET (UTC+1)
    - cron: "0 9 * * *"   # 10:00 Copenhagen during CET (UTC+1)
    - cron: "0 10 * * *"  # 11:00 Copenhagen during CET (UTC+1)
    - cron: "0 11 * * *"  # 12:00 Copenhagen during CET (UTC+1)
    - cron: "0 12 * * *"  # 13:00 Copenhagen during CET (UTC+1)
    - cron: "0 14 * * *"  # 15:00 Copenhagen during CET (UTC+1)
    - cron: "0 15 * * *"  # 16:00 Copenhagen during CET (UTC+1)
  workflow_dispatch: {}
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download published CSV
        run: |
          mkdir -p data
          curl -L "${{ secrets.PUBLISHED_CSV_URL }}" -o data/public.csv

      - name: Commit if changed
        run: |
          git config user.name "intervals-bot"
          git config user.email "intervals-bot@users.noreply.github.com"
          git add data/public.csv
          git diff --cached --quiet || git commit -m "Update public.csv"
          git push
